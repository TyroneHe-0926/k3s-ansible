apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: pihole
  labels:
    app: pihole
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: hahafhaha-ubuntu-26.04-server
      containers:
        - name: pihole
          image: pihole/pihole:2025.06.1
          env:
            - name: TZ
              value: "America/Toronto"
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: pihole-secret
                  key: password
            - name: FTLCONF_dns_listeningMode
              value: "ALL"
            - name: FTLCONF_webserver_port
              value: "8081,8443s"
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_TIME
                - SYS_NICE
          volumeMounts:
            - name: pihole-data
              mountPath: /etc/pihole
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - dig
                - +short
                - +time=2
                - +tries=1
                - "@127.0.0.1"
                - cloudflare.com
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - dig
                - +short
                - +time=2
                - +tries=1
                - "@127.0.0.1"
                - cloudflare.com
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: pihole-data
          persistentVolumeClaim:
            claimName: pihole-data
